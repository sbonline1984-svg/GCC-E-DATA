<!DOCTYPE html>
<html lang="as">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCC Employee Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Sanskrit&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card: #1c2230;
    --border: #30363d;
    --accent: #f0883e;
    --accent2: #58a6ff;
    --text: #e6edf3;
    --muted: #8b949e;
    --success: #3fb950;
    --tag-bg: #1f2d40;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0f2042 0%, #1a1033 50%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 24px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(88,166,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .college-name {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: clamp(20px, 4vw, 30px);
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .header .subtitle {
    color: var(--muted);
    font-size: 13px;
  }
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-pill b { color: var(--accent2); }

  /* Search section */
  .search-section {
    max-width: 780px;
    margin: 28px auto 0;
    padding: 0 16px;
  }
  .search-wrap {
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
    pointer-events: none;
  }
  #searchInput {
    width: 100%;
    padding: 14px 48px 14px 46px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #searchInput:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(88,166,255,0.12);
  }
  #searchInput::placeholder { color: var(--muted); }
  .clear-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--border);
    border: none;
    color: var(--muted);
    width: 24px; height: 24px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    display: none;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .clear-btn:hover { background: #444; color: #fff; }

  /* Filter chips */
  .filters {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .chip {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--accent2); color: var(--accent2); }
  .chip.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #0d1117;
    font-weight: 600;
  }

  /* Results info */
  .results-info {
    max-width: 780px;
    margin: 16px auto 0;
    padding: 0 16px;
    font-size: 13px;
    color: var(--muted);
    min-height: 18px;
  }

  /* Suggestions dropdown */
  .suggestions-box {
    max-width: 780px;
    margin: 4px auto 0;
    padding: 0 16px;
    position: relative;
    z-index: 100;
  }
  .suggestions {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .suggestion-item {
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--tag-bg); }
  .sug-name { font-size: 14px; }
  .sug-meta { font-size: 11px; color: var(--muted); }

  /* Cards grid */
  .cards-area {
    max-width: 780px;
    margin: 20px auto 40px;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* Employee Card */
  .emp-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.25s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .emp-card:hover {
    border-color: var(--accent2);
    box-shadow: 0 4px 20px rgba(88,166,255,0.08);
  }
  .card-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    user-select: none;
  }
  .avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .emp-main { flex: 1; }
  .emp-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .emp-desig {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .right-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }
  .group-badge {
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .group-A { background: rgba(240,136,62,0.15); color: var(--accent); border: 1px solid rgba(240,136,62,0.3); }
  .group-B { background: rgba(88,166,255,0.12); color: var(--accent2); border: 1px solid rgba(88,166,255,0.25); }
  .group-C { background: rgba(63,185,80,0.12); color: var(--success); border: 1px solid rgba(63,185,80,0.25); }
  .group-D { background: rgba(200,200,200,0.08); color: #aaa; border: 1px solid rgba(200,200,200,0.2); }
  .toggle-arrow {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.25s;
    margin-top: 4px;
  }
  .emp-card.open .toggle-arrow { transform: rotate(180deg); }

  /* Card body */
  .card-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 18px 20px;
    gap: 10px;
    flex-direction: column;
  }
  .emp-card.open .card-body { display: flex; }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 480px) {
    .info-grid { grid-template-columns: 1fr; }
    .info-grid .full { grid-column: 1; }
  }
  .info-item {
    background: var(--surface);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .info-item.full { grid-column: 1 / -1; }
  .info-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .info-value {
    font-size: 14px;
    color: var(--text);
    word-break: break-all;
  }
  .info-value a {
    color: var(--accent2);
    text-decoration: none;
  }
  .info-value a:hover { text-decoration: underline; }
  .na { color: var(--border); font-style: italic; font-size: 13px; }

  /* Bank section */
  .bank-section {
    background: rgba(240,136,62,0.05);
    border: 1px solid rgba(240,136,62,0.15);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .bank-title {
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .bank-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  @media (max-width: 520px) {
    .bank-grid { grid-template-columns: 1fr 1fr; }
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    display: none;
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 8px; }

  /* Welcome state */
  .welcome-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
  }
  .welcome-state .emoji { font-size: 56px; margin-bottom: 16px; }
  .welcome-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .welcome-state p { font-size: 14px; line-height: 1.6; }

  /* Address section */
  .addr-section {
    background: rgba(63,185,80,0.05);
    border: 1px solid rgba(63,185,80,0.18);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .addr-title {
    font-size: 11px;
    color: var(--success);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .addr-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  @media (max-width: 520px) { .addr-grid { grid-template-columns: 1fr; } }
</style>
</head>

// Filter chips
document.getElementById('filterChips').addEventListener('click', e => {
  if (!e.target.classList.contains('chip')) return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter = e.target.dataset.filter;
  doSearch(searchInput.value.trim());
});

function filterEmployees(q, filter) {
  return EMPLOYEES.filter(emp => {
    const nameMatch = q === '' || emp.name.toLowerCase().includes(q.toLowerCase());
    let groupMatch = true;
    if (filter === 'Group-A') groupMatch = emp.group === 'Group-A';
    else if (filter === 'Group-B') groupMatch = emp.group === 'Group-B';
    else if (filter === 'Group-C') groupMatch = emp.group === 'Group-C';
    else if (filter === 'Group-D') groupMatch = emp.group === 'Group-D';
    else if (filter === 'contractual') groupMatch = emp.designation.toLowerCase().includes('contractual');
    return nameMatch && groupMatch;
  });
}

function getInitials(name) {
  return name.split(' ').filter(w=>w && w!=='Dr.'&&w!=='Dr').slice(0,2).map(w=>w[0]).join('').toUpperCase() || name[0].toUpperCase();
}

function getGroupClass(grp) {
  if (!grp) return '';
  if (grp === 'Group-A') return 'group-A';
  if (grp === 'Group-B') return 'group-B';
  if (grp === 'Group-C') return 'group-C';
  return 'group-D';
}

function val(v) {
  if (!v || v === 'nan' || v === 'NaT') return '<span class="na">—</span>';
  return v;
}

function fmtDate(d) {
  if (!d || d==='nan'||d==='NaT') return '<span class="na">—</span>';
  try {
    const dt = new Date(d);
    return dt.toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'});
  } catch { return d; }
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function infoItem(label, value, full) {
  if (!value || value === 'nan' || value === 'NaT') return '';
  return '<div class="info-item'+(full?' full':'')+'"><div class="info-label">'+label+'</div><div class="info-value">'+value+'</div></div>';
}

function renderCard(emp, idx) {
  const initials = getInitials(emp.name);
  const grpClass = getGroupClass(emp.group);
  const hasBankInfo = emp.bank_ac || emp.ifsc;
  const hasAddr = emp.perm_addr || emp.curr_addr;

  let addrHtml = '';
  if (hasAddr) {
    addrHtml = '<div class="addr-section"><div class="addr-title">📍 ঠিকনা (Address)</div><div class="addr-grid">';
    if (emp.perm_addr) addrHtml += '<div class="info-item"><div class="info-label">স্থায়ী ঠিকনা (Permanent)</div><div class="info-value" style="font-size:13px;line-height:1.5">'+esc(emp.perm_addr)+'</div></div>';
    if (emp.curr_addr) addrHtml += '<div class="info-item"><div class="info-label">বৰ্তমান ঠিকনা (Current)</div><div class="info-value" style="font-size:13px;line-height:1.5">'+esc(emp.curr_addr)+'</div></div>';
    addrHtml += '</div></div>';
  }

  let bankHtml = '';
  if (hasBankInfo) {
    bankHtml = '<div class="bank-section"><div class="bank-title">🏦 বেংক তথ্য</div><div class="bank-grid">';
    if (emp.bank_ac) bankHtml += '<div class="info-item"><div class="info-label">Account No.</div><div class="info-value">'+esc(emp.bank_ac)+'</div></div>';
    if (emp.ifsc)    bankHtml += '<div class="info-item"><div class="info-label">IFSC Code</div><div class="info-value">'+esc(emp.ifsc)+'</div></div>';
    if (emp.employee_id) bankHtml += '<div class="info-item"><div class="info-label">Employee ID</div><div class="info-value">'+esc(emp.employee_id)+'</div></div>';
    bankHtml += '</div></div>';
  }

  let gridHtml = '<div class="info-grid">';
  gridHtml += '<div class="info-item"><div class="info-label">📱 Mobile</div><div class="info-value"><a href="tel:'+esc(emp.mobile)+'">'+val(emp.mobile)+'</a></div></div>';
  gridHtml += '<div class="info-item"><div class="info-label">⚧ Gender</div><div class="info-value">'+val(emp.gender)+'</div></div>';
  gridHtml += '<div class="info-item full"><div class="info-label">✉️ Email</div><div class="info-value">'+(emp.email ? '<a href="mailto:'+esc(emp.email)+'">'+esc(emp.email)+'</a>' : '<span class="na">—</span>')+'</div></div>';
  gridHtml += '<div class="info-item"><div class="info-label">🎂 জন্ম তাৰিখ</div><div class="info-value">'+fmtDate(emp.dob)+'</div></div>';
  gridHtml += '<div class="info-item"><div class="info-label">📅 অৱসৰ তাৰিখ</div><div class="info-value">'+fmtDate(emp.retirement_date)+'</div></div>';
  if (emp.department) gridHtml += '<div class="info-item"><div class="info-label">🏛️ Department</div><div class="info-value">'+esc(emp.department)+'</div></div>';
  if (emp.caste)      gridHtml += '<div class="info-item"><div class="info-label">📋 Caste</div><div class="info-value">'+esc(emp.caste)+'</div></div>';
  if (emp.appointment_date) gridHtml += '<div class="info-item"><div class="info-label">📌 নিযুক্তি তাৰিখ</div><div class="info-value">'+fmtDate(emp.appointment_date)+'</div></div>';
  if (emp.qualification) gridHtml += '<div class="info-item"><div class="info-label">🎓 যোগ্যতা</div><div class="info-value">'+esc(emp.qualification)+'</div></div>';
  gridHtml += '</div>';

  return '<div class="emp-card" id="card'+idx+'">'
    + '<div class="card-header" onclick="toggleCard('+idx+')">'
    + '<div class="avatar">'+initials+'</div>'
    + '<div class="emp-main">'
    + '<div class="emp-name">'+esc(emp.name)+'</div>'
    + '<div class="emp-desig">'+(emp.designation||'—')+(emp.employee_id ? ' · <span style="color:#58a6ff;font-size:11px;">'+esc(emp.employee_id)+'</span>' : '')+'</div>'
    + '</div>'
    + '<div class="right-meta">'
    + (emp.group ? '<span class="group-badge '+grpClass+'">'+emp.group+'</span>' : '')
    + '<span class="toggle-arrow">▼</span>'
    + '</div></div>'
    + '<div class="card-body">'+gridHtml+addrHtml+bankHtml+'</div>'
    + '</div>';
}

function toggleCard(idx) {
  const card = document.getElementById('card'+idx);
  card.classList.toggle('open');
}

function doSearch(q) {
  hideSuggestions();
  const results = filterEmployees(q, activeFilter);
  
  if (q === '' && activeFilter === 'all') {
    cardsArea.innerHTML = `<div class="welcome-state"><div class="emoji">🏫</div><h3>কৰ্মচাৰীৰ নাম সন্ধান কৰক</h3><p>ওপৰৰ search box-ত কৰ্মচাৰীৰ নাম লিখক।<br>তেওঁৰ সকলো তথ্য তলত দেখা যাব।</p></div>`;
    resultsInfo.textContent = '';
    return;
  }
  
  if (results.length === 0) {
    cardsArea.innerHTML = `<div class="empty-state" style="display:block"><div class="emoji">🔎</div><h3>"${q}" নামেৰে কোনো কৰ্মচাৰী পোৱা নগ'ল</h3><p>সঠিক নাম বা আংশিক নাম লিখক।</p></div>`;
    resultsInfo.textContent = '';
    return;
  }
  
  resultsInfo.textContent = `${results.length} জন কৰ্মচাৰী পোৱা গ'ল`;
  cardsArea.innerHTML = results.map((emp, i) => renderCard(emp, i)).join('');
  // Auto-open if single result
  if (results.length === 1) {
    setTimeout(() => document.getElementById('card0')?.classList.add('open'), 50);
  }
}

function showSuggestions(q) {
  if (q.length < 1) { hideSuggestions(); return; }
  const matches = EMPLOYEES.filter(e => e.name.toLowerCase().includes(q.toLowerCase())).slice(0, 6);
  if (matches.length === 0) { hideSuggestions(); return; }
  sugDiv.innerHTML = matches.map(e => `
    <div class="suggestion-item" onclick="selectSuggestion('${e.name.replace(/'/g,"\\'")}')">
      <span class="sug-name">${e.name}</span>
      <span class="sug-meta">${e.designation || ''}</span>
    </div>`).join('');
  sugDiv.style.display = 'block';
}

function hideSuggestions() { sugDiv.style.display = 'none'; }

function selectSuggestion(name) {
  searchInput.value = name;
  clearBtn.style.display = 'flex';
  doSearch(name);
  hideSuggestions();
}

searchInput.addEventListener('input', e => {
  const q = e.target.value.trim();
  clearBtn.style.display = q ? 'flex' : 'none';
  showSuggestions(q);
  doSearch(q);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') hideSuggestions();
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.style.display = 'none';
  doSearch('');
  searchInput.focus();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-section') && !e.target.closest('.suggestions-box')) hideSuggestions();
});
</script>
</body>
</html>
